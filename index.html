<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇰🇷 釜山美學之旅</title>
    <style>
        :root {
            --primary-color: #a8dadc;
            --secondary-color: #457b9d;
            --accent-color: #e63946;
            --bg-color: #f1faee;
            --card-bg: #ffffff;
            --text-color: #1d3557;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--secondary-color);
            color: white;
            padding: 20px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 導覽分頁 */
        .tabs {
            display: flex;
            background: white;
            position: sticky;
            top: 75px;
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .tab.active {
            border-bottom: 3px solid var(--accent-color);
            color: var(--accent-color);
        }

        .content-section {
            display: none;
            padding: 15px;
        }

        .content-section.active {
            display: block;
        }

        /* 卡片樣式 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .day-title {
            background: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item {
            margin-bottom: 15px;
            border-left: 3px solid var(--primary-color);
            padding-left: 10px;
        }

        .time {
            font-weight: bold;
            color: var(--secondary-color);
            font-size: 0.9rem;
        }

        .location-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 3px 0;
        }

        .address {
            font-size: 0.85rem;
            color: #666;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            word-break: break-all;
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }

        .btn-copy { background-color: #eee; color: #333; }
        .btn-map { background-color: #03C75A; color: white; } /* Naver Green */

        /* 匯率計算器 */
        .converter-grid {
            display: grid;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
        }

        /* 航班資訊 */
        .flight-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
